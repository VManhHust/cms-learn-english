spring.application.name=cms-learn-english
server.port=${PORT:8081}

spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.schemas=public
spring.flyway.default-schema=public
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.repair-on-migrate=true

jwt.secret=${JWT_SECRET:}
jwt.access-token-expiration=900
jwt.refresh-token-expiration=604800

allowed.origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Oxford Dictionaries API
oxford.api.base-url=${OXFORD_API_BASE_URL:}
oxford.api.app-id=${OXFORD_API_APP_ID:}
oxford.api.app-key=${OXFORD_API_APP_KEY:}

google.oauth.client-id=${GOOGLE_CLIENT_ID:}
google.oauth.client-secret=${GOOGLE_CLIENT_SECRET:}
google.oauth.redirect-uri=${GOOGLE_REDIRECT_URI:}

frontend.url=${FRONTEND_URL:http://localhost:3000}
app.cookie.secure=${APP_COOKIE_SECURE:false}

# YouTube API Configuration
youtube.api.key=${YOUTUBE_API_KEY:}
youtube.api.timeout-seconds=${YOUTUBE_API_TIMEOUT_SECONDS:15}
youtube.api.max-retries=${YOUTUBE_API_MAX_RETRIES:2}
youtube.cache.channel-ttl-minutes=${YOUTUBE_CACHE_TTL_MINUTES:60}
youtube.cache.max-size=${YOUTUBE_CACHE_MAX_SIZE:1000}
youtube.downloader.max-retries=${YOUTUBE_DOWNLOADER_MAX_RETRIES:1}

# Hibernate SQL logging
spring.jpa.show-sql=true    
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.com.example.cmslearnenglish=DEBUG


# Python Script Configuration
python.command=${PYTHON_COMMAND:python}
python.script.path=${PYTHON_SCRIPT_PATH:scripts/download_transcript.py}
python.script.timeout=${PYTHON_SCRIPT_TIMEOUT:30}

# Email / SMTP (Gmail)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:vanmanh3062001@gmail.com}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# OTP config
otp.expiry-minutes=${OTP_EXPIRY_MINUTES:10}

# PRO payment / SePay
payment.order.expiry-minutes=${PAYMENT_ORDER_EXPIRY_MINUTES:30}
payment.sepay.bank=${SEPAY_BANK:VPBank}
payment.sepay.account-number=${SEPAY_ACCOUNT_NUMBER:0989174182}
payment.sepay.account-holder=${SEPAY_ACCOUNT_HOLDER:NGUYEN VAN MANH}
payment.sepay.webhook-secret=${SEPAY_WEBHOOK_SECRET:}

